esphome:
  name: desk
  friendly_name: "Standing Desk"
  includes:
    - desk_controller.h

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Desk-Fallback"
    password: "12345678"

api:
  encryption:
    key: !secret api_key

ota:
  password: !secret ota_password

substitutions:
  pin_m: "9"
  pin_up: "10"
  pin_down: "11"
  pin_1: "12"
  pin_2: "13"
  pin_3: "14"

globals:
  - id: target_height
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: last_activity_time
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_known_height
    type: float
    restore_value: no
    initial_value: '0.0'

custom_component:
  - id: main_desk_controller
    lambda: |-
      return {get_desk_controller()};

sensor:
  - platform: custom
    lambda: |-
      auto desk = get_desk_controller();
      return {desk->height_sensor};
    sensors:
      - name: "Desk Height"
        id: actual_height
        unit_of_measurement: "cm"
        accuracy_decimals: 1
        icon: "phu:desk-sit-alt" 
        state_class: measurement
        force_update: true
        on_value:
          then:
            - lambda: |-
                if (abs(x - id(last_known_height)) > 0.05) {
                  id(last_activity_time) = millis();
                  id(last_known_height) = x;
                }
            - if:
                condition:
                  lambda: 'return id(target_height) > 0.0;'
                then:
                  - lambda: |-
                      static uint32_t last_pulse = 0;
                      float current = x;
                      float target = id(target_height);
                      float diff = target - current;
                      
                      if (abs(diff) <= 0.05) { 
                        pinMode(${pin_up}, INPUT);
                        pinMode(${pin_down}, INPUT);
                        id(target_height) = 0.0;
                        return;
                      } 
                      
                      if (abs(diff) > 1.5) {
                        if (diff > 0) {
                          pinMode(${pin_down}, INPUT);
                          pinMode(${pin_up}, OUTPUT); 
                          digitalWrite(${pin_up}, LOW);
                        } else {
                          pinMode(${pin_up}, INPUT);
                          pinMode(${pin_down}, OUTPUT); 
                          digitalWrite(${pin_down}, LOW);
                        }
                      } 
                      else {
                        pinMode(${pin_up}, INPUT);
                        pinMode(${pin_down}, INPUT);
                        
                        uint32_t now = millis();
                        if (now - last_pulse > 600) {
                          if (diff > 0) {
                            pinMode(${pin_up}, OUTPUT);
                            digitalWrite(${pin_up}, LOW);
                            delay(150);
                            pinMode(${pin_up}, INPUT);
                          } else {
                            pinMode(${pin_down}, OUTPUT);
                            digitalWrite(${pin_down}, LOW);
                            delay(150);
                            pinMode(${pin_down}, INPUT);
                          }
                          last_pulse = millis();
                        }
                      }

number:
  - platform: template
    name: "Target Height"
    id: desk_slider
    min_value: 60
    max_value: 125
    step: 0.5
    unit_of_measurement: "cm"
    icon: "mdi:car-seat-cooler"
    optimistic: true
    set_action:
      then:
        - lambda: |-
            float adjusted;
            if (x < 100.0) {
              adjusted = round(x * 2.0) / 2.0;
            } else {
              adjusted = round(x);
            }
            
            if (millis() - id(last_activity_time) > 10000) {
              pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(100); pinMode(${pin_m}, INPUT); 
              delay(300);
            }
            id(last_activity_time) = millis();
            
            id(target_height) = adjusted;
            id(actual_height).publish_state(id(actual_height).state);

button:
  - platform: template
    name: "Click M"
    icon: "mdi:alpha-m-circle-outline"
    on_press:
      - lambda: |-
          if (millis() - id(last_activity_time) > 10000) {
            pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(100); pinMode(${pin_m}, INPUT); delay(300);
          }
          id(last_activity_time) = millis();
          pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(200); pinMode(${pin_m}, INPUT);

  - platform: template
    name: "Click M1"
    icon: "mdi:numeric-1-circle-outline"
    on_press:
      - lambda: |-
          if (millis() - id(last_activity_time) > 10000) {
            pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(100); pinMode(${pin_m}, INPUT); delay(300);
          }
          id(last_activity_time) = millis();
          pinMode(${pin_1}, OUTPUT); digitalWrite(${pin_1}, LOW); delay(200); pinMode(${pin_1}, INPUT);

  - platform: template
    name: "Click M2"
    icon: "mdi:numeric-2-circle-outline"
    on_press:
      - lambda: |-
          if (millis() - id(last_activity_time) > 10000) {
            pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(100); pinMode(${pin_m}, INPUT); delay(300);
          }
          id(last_activity_time) = millis();
          pinMode(${pin_2}, OUTPUT); digitalWrite(${pin_2}, LOW); delay(200); pinMode(${pin_2}, INPUT);

  - platform: template
    name: "Click M3"
    icon: "mdi:numeric-3-circle-outline"
    on_press:
      - lambda: |-
          if (millis() - id(last_activity_time) > 10000) {
            pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(100); pinMode(${pin_m}, INPUT); delay(300);
          }
          id(last_activity_time) = millis();
          pinMode(${pin_3}, OUTPUT); digitalWrite(${pin_3}, LOW); delay(200); pinMode(${pin_3}, INPUT);

switch:
  - platform: template
    name: "Hold UP"
    id: hold_up
    icon: "mdi:arrow-up-bold-box-outline"
    optimistic: true
    turn_on_action:
      - lambda: |-
          if (millis() - id(last_activity_time) > 10000) {
            pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(100); pinMode(${pin_m}, INPUT); delay(300);
          }
          id(last_activity_time) = millis();
          
          id(target_height) = 0.0;
          pinMode(${pin_down}, INPUT);
          pinMode(${pin_up}, OUTPUT); 
          digitalWrite(${pin_up}, LOW);
    turn_off_action:
      - lambda: 'pinMode(${pin_up}, INPUT);'

  - platform: template
    name: "Hold DOWN"
    id: hold_down
    icon: "mdi:arrow-down-bold-box-outline"
    optimistic: true
    turn_on_action:
      - lambda: |-
          if (millis() - id(last_activity_time) > 10000) {
            pinMode(${pin_m}, OUTPUT); digitalWrite(${pin_m}, LOW); delay(100); pinMode(${pin_m}, INPUT); delay(300);
          }
          id(last_activity_time) = millis();
          
          id(target_height) = 0.0;
          pinMode(${pin_up}, INPUT);
          pinMode(${pin_down}, OUTPUT); 
          digitalWrite(${pin_down}, LOW);
    turn_off_action:
      - lambda: 'pinMode(${pin_down}, INPUT);'